name: Publish CardTools v1.8.0 Direct Download

on:
  pull_request:
    branches:
      - main
    paths:
      - 'duplicate-cleaner/**'
      - '.github/workflows/publish-cardtools-v180.yml'

permissions:
  contents: write

jobs:
  publish-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tested source branch
        uses: actions/checkout@v4
        with:
          ref: apk-duplicate-cleaner
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        working-directory: duplicate-cleaner
        run: gradle :app:assembleDebug --stacktrace

      - name: Verify and stage APK
        run: |
          set -euo pipefail
          APK='duplicate-cleaner/app/build/outputs/apk/debug/app-debug.apk'
          test -s "$APK"
          file "$APK" | grep -q 'Android package'
          cp "$APK" /tmp/CardTools-v1.8.0.apk
          sha256sum /tmp/CardTools-v1.8.0.apk | tee /tmp/SHA256.txt
          stat -c '%s bytes' /tmp/CardTools-v1.8.0.apk | tee /tmp/FILE_SIZE.txt

      - name: Publish binary to dedicated download branch
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout --orphan apk-download-v1.8.0
          git rm -rf .
          mkdir -p downloads
          cp /tmp/CardTools-v1.8.0.apk downloads/CardTools-v1.8.0.apk
          cp /tmp/SHA256.txt downloads/SHA256.txt
          cp /tmp/FILE_SIZE.txt downloads/FILE_SIZE.txt
          cat > README.md <<'EOF'
          # CardTools v1.8.0

          Direct Android APK download branch.

          - APK: `downloads/CardTools-v1.8.0.apk`
          - Expected size: see `downloads/FILE_SIZE.txt`
          - SHA-256: see `downloads/SHA256.txt`
          EOF
          git add README.md downloads/
          git commit -m 'Publish tested CardTools v1.8.0 APK'
          git push origin HEAD:refs/heads/apk-download-v1.8.0 --force
