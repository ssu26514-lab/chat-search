name: Publish CardTools v1.8.0 Release

on:
  pull_request:
    branches:
      - main
    paths:
      - 'duplicate-cleaner/**'
      - '.github/workflows/publish-cardtools-v180-release.yml'

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tested source branch
        uses: actions/checkout@v4
        with:
          ref: apk-duplicate-cleaner
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        working-directory: duplicate-cleaner
        run: gradle :app:assembleDebug --stacktrace

      - name: Verify APK
        run: |
          set -euo pipefail
          APK='duplicate-cleaner/app/build/outputs/apk/debug/app-debug.apk'
          test -s "$APK"
          file "$APK" | grep -q 'Android package'
          cp "$APK" CardTools-v1.8.0.apk
          sha256sum CardTools-v1.8.0.apk > SHA256.txt
          stat -c '%s' CardTools-v1.8.0.apk > FILE_SIZE.txt

      - name: Create or replace GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete v1.8.0 --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create v1.8.0 CardTools-v1.8.0.apk SHA256.txt FILE_SIZE.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "CardTools v1.8.0" \
            --notes "Tested Android APK. Includes PNG and JSON character-card support plus SillyTavern file classification."

