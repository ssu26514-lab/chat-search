name: Build Duplicate Cleaner APK (PR)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'duplicate-cleaner/**'
      - '.github/workflows/build-duplicate-cleaner-pr.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build debug APK
        working-directory: duplicate-cleaner
        run: gradle :app:assembleDebug --stacktrace
      - name: Prepare artifact
        run: cp duplicate-cleaner/app/build/outputs/apk/debug/app-debug.apk duplicate-cleaner-v1.0.0.apk
      - uses: actions/upload-artifact@v4
        with:
          name: duplicate-cleaner-apk
          path: duplicate-cleaner-v1.0.0.apk
          if-no-files-found: error
